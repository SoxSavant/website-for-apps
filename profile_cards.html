<!DOCTYPE html>
<html>
    <head>
        <meta name="description" content="Explore and customize MLB hitter and pitcher stats with SoxSavant. Build leaderboards, profile cards, and comparison graphics your way.">
        <meta name="keywords" content="MLB, Baseball, Statcast, Hitter Stats, Pitcher Stats, Baseball Analytics, MLB Leaderboards">
        <meta property="og:title" content="SoxSavant – Custom MLB Stats and Graphics">
        <meta property="og:description" content="Explore and customize MLB hitter and pitcher stats with SoxSavant. Build leaderboards, profile cards, and comparison graphics your way.">
        <meta property="og:image" content="https://www.soxsavant.com/images/preview.png">
        <meta property="og:url" content="https://www.soxsavant.com/">
        <meta name="twitter:card" content="summary_large_image">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SoxSavant - Profile Cards</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
        <script defer src="/_vercel/insights/script.js"></script>
    </head>
    <body>
        <header>
            <img id="my-logo" src="/images/mylogo.png">
            <div id="title">SoxSavant</div>
            <nav>
                <a href="/">Home</a>
                <a href="/hitting_apps">Hitting Apps</a>
                <a href="/pitching_apps">Pitching Apps</a>
                <a href="/profile_cards" class="active">Profile Cards</a>
            </nav>
        </header>
        <main>
            <div class="cards-grid">

                <a class="card-link" href="https://sports-card-generator.vercel.app/hitter" target="_blank">
                    <img loading = "lazy" class="profile-card-img" src="/images/hitter-profile-card.png" alt="Hitter profile card showing Bobby Witt Jr's 2024 season stats">
                    <div class="card-label">
                        <h2 class="app-title">Hitter Profile Card ↗</h2>
                        <p class="paragraph">Generate a hitter's profile card for any season, color-coded to their team.</p>
                    </div>
                </a>

                <a class="card-link" href="https://sports-card-generator.vercel.app/pitcher" target="_blank">
                    <img loading = "lazy" class="profile-card-img" src="/images/pitcher-profile-card.png" alt="Pitcher profile card showing Paul Skenes' 2025 season stats">
                    <div class="card-label">
                        <h2 class="app-title">Pitcher Profile Card ↗</h2>
                        <p class="paragraph">Generate a pitcher's profile card for any season, color-coded to their team.</p>
                    </div>
                </a>

            </div>
        </main>
    </body>
</html>
